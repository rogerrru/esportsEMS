<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <title>VALORANT//EVENTS</title>
    <link rel="icon" href="../assets/media/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/v4-shims.css" />
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/navbar.css" />
    <link rel="stylesheet" href="../assets/css/hero.css" />
    <link rel="stylesheet" href="../assets/css/events.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar"></nav>

<!-- HERO -->
<header>
    <div class="video-container">
        <video autoplay muted loop class="myVideo">
            <source src="../assets/media/agent-background-generic.mp4" type="video/mp4" />
        </video>
        <div class="valo-img-container">
            <img src="../assets/media/agents-group-31d7ce5a3637e45d8b25d2fd03159e6c.png" alt="valo-img" class="valo-img" />
        </div>
        <div class="text-overlay">
            <h1>EVENTS</h1>
        </div>
    </div>
</header>

<!-- EVENTS BODY -->
<main class="events-main">

    <!-- Tournaments section -->
    <section class="events-section">
        <div class="events-section-header">
            <h2 class="events-section-title">TOURNAMENTS</h2>
            <div class="events-tab-bar">
                <button class="events-tab active" data-q="upcoming">UPCOMING</button>
                <button class="events-tab" data-q="live">LIVE</button>
                <button class="events-tab" data-q="completed">COMPLETED</button>
            </div>
        </div>
        <div id="eventsGrid" class="events-grid">
            <div class="events-loading">Loading tournaments…</div>
        </div>
    </section>

    <!-- Matches section -->
    <section class="events-section" style="margin-top:4rem;">
        <div class="events-section-header">
            <h2 class="events-section-title">MATCHES</h2>
            <div class="events-tab-bar">
                <button class="match-tab active" data-q="upcoming">UPCOMING</button>
                <button class="match-tab" data-q="live_score">LIVE</button>
                <button class="match-tab" data-q="results">RESULTS</button>
            </div>
        </div>

        <div class="matches-controls">
            <input type="text" id="matchSearch" placeholder="Filter by team or tournament…" />
            <select id="tournamentFilter">
                <option value="">All Tournaments</option>
            </select>
        </div>

        <div class="match-header-row">
            <span>TOURNAMENT</span>
            <span>ROUND</span>
            <span>TEAMS</span>
            <span>SCORE</span>
        </div>

        <div id="matchList" class="match-list">
            <div class="events-loading">Loading matches…</div>
        </div>

        <div class="events-pagination">
            <button id="prevPage" disabled>← Prev</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextPage">Next →</button>
        </div>
    </section>
</main>

<footer>
    <p><i class="fas fa-copyright"></i> 2023 TEAM DYNAMITE</p>
    <p class="p2">All images, videos, and contents are property of RIOT GAMES</p>
</footer>

<script src="https://unpkg.com/scrollreveal"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/navbar.js"></script>
<script src="../assets/js/events.js"></script>
<script src="../assets/js/index.js"></script>
</body>
</html>
